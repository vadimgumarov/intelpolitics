# ventures/intelpolitics/k8s/scrape-cronjob.yaml
#
# CronJob: nightly Phase C Starmer T1 ingest.
#
# Phase C (2026-05-12): rewritten to fire the Starmer-only T1 pipeline
# (4 strategies — Hansard / Commons Votes / Lobbying-Register / Members API)
# instead of the legacy multi-politician T4 scrape. Other 4 politicians
# wait for Phase D per Vadim's 2026-05-12 lock.
#
# Schedule: 22:00 America/Los_Angeles (PDT/PST). Encoded via k8s 1.27+
# spec.timeZone (k3s 1.33 confirmed). Falls back gracefully to UTC if the
# field is rejected — the comment below documents the UTC offset for ops.
#
# Pipeline:
#   1. initContainer: wait for postgres-0 reachability (per Ops Phase A finding).
#   2. main: python -m src.pipelines.phase_c_starmer
#      - validate sources.v2.yaml (DR rule 2 startup gate)
#      - upsert each source into the `sources` table
#      - run each strategy in order; insert rows with content-hash dedup
#      - print PHASE_C_SUMMARY JSON to stdout
#
# Pre-reqs (verified 2026-05-12):
#   - intelpolitics-conductor namespace exists.
#   - pg-creds secret + postgres service present.
#   - Image intelpolitics-scraper:2026-05-13-phase-c-metrics built (Ops to build).
#   - Migration 002_sources_v2.sql applied (Builder to coordinate with Ops).
#
# DR-24 dry-run gate:
#   kubectl apply -f scrape-cronjob.yaml -n intelpolitics-conductor --dry-run=server
# Live apply:
#   kubectl apply -f scrape-cronjob.yaml -n intelpolitics-conductor
# Suspend (current default):
#   kubectl patch cronjob intelpolitics-scrape-nightly -n intelpolitics-conductor \
#     -p '{"spec":{"suspend":true}}'
# Resume after Phase C verification passes:
#   kubectl patch cronjob intelpolitics-scrape-nightly -n intelpolitics-conductor \
#     -p '{"spec":{"suspend":false}}'
# Trigger one-off run NOW (manual scrape per Phase C plan C.4):
#   kubectl create job --from=cronjob/intelpolitics-scrape-nightly \
#     --name=phase-c-first-scrape -n intelpolitics-conductor
# Observe:
#   kubectl get cronjob,jobs -n intelpolitics-conductor
#   kubectl logs -f job/phase-c-first-scrape -n intelpolitics-conductor
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: intelpolitics-scrape-nightly
  namespace: intelpolitics-conductor
  labels:
    app.kubernetes.io/name: intelpolitics-scrape-nightly
    app.kubernetes.io/component: pipeline
    app.kubernetes.io/part-of: intelpolitics
    pipeline.intelpolitics/source: phase-c-starmer
    pipeline.intelpolitics/phase: "C"
spec:
  # Suspended until Phase C verification passes (DR Q-SRC-3).
  # Lift via: kubectl patch ... -p '{"spec":{"suspend":false}}'
  suspend: true
  # 22:00 PDT every day. PDT = UTC-7, so this fires at 05:00 UTC.
  schedule: "0 22 * * *"
  timeZone: "America/Los_Angeles"
  # If the cluster is down at 22:00 PDT we still want the run within 6h.
  startingDeadlineSeconds: 21600
  concurrencyPolicy: Forbid               # one scrape at a time
  successfulJobsHistoryLimit: 7           # keep a week of Completed for audit
  failedJobsHistoryLimit: 5
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: intelpolitics-scrape-nightly
        app.kubernetes.io/component: pipeline
        pipeline.intelpolitics/phase: "C"
    spec:
      # Phase C backoff bump per plan C.4: 4 (was 2). Allows transient
      # network/api hiccups on Hansard / Commons Votes / Lobbying Register
      # to retry without surfacing as Job failure.
      backoffLimit: 4
      ttlSecondsAfterFinished: 604800     # 7 days; lines up with successful-history window
      completions: 1
      parallelism: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: intelpolitics-scrape-nightly
            app.kubernetes.io/component: pipeline
            pipeline.intelpolitics/phase: "C"
        spec:
          restartPolicy: OnFailure
          # initContainer: Postgres readiness gate (per Ops Phase A finding —
          # job was racing against postgres-0 cold-start on the 22:00 fire).
          initContainers:
            - name: wait-for-postgres
              image: postgres:15-alpine
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: pg-creds
              env:
                - name: POSTGRES_HOST
                  value: "postgres"
                - name: POSTGRES_PORT
                  value: "5432"
              command:
                - sh
                - -c
                - |
                  echo "init: waiting for Postgres at $POSTGRES_HOST:$POSTGRES_PORT"
                  i=0
                  until pg_isready -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "${POSTGRES_USER:-intelpolitics_app}" -d "${POSTGRES_DB:-intelpolitics_db}" -t 5; do
                    i=$((i + 1))
                    if [ "$i" -ge 60 ]; then
                      echo "init: postgres still not ready after 60 attempts — aborting"
                      exit 1
                    fi
                    echo "init: postgres not ready (attempt $i); sleeping 5s"
                    sleep 5
                  done
                  echo "init: postgres ready"
              resources:
                requests:
                  memory: "32Mi"
                  cpu: "50m"
                limits:
                  memory: "128Mi"
                  cpu: "200m"
          containers:
            - name: scrape
              image: intelpolitics-scraper:2026-05-13-phase-c-metrics
              imagePullPolicy: Never      # DR-25 supply-chain: containerd-only image
              command: ["python", "-m", "src.pipelines.phase_c_starmer"]
              args:
                - "--sources-v2"
                - "/app/sources.v2.yaml"
                - "--metrics-csv"
                - "/tmp/phase-c-metrics.csv"
              envFrom:
                - secretRef:
                    name: pg-creds
              env:
                - name: POSTGRES_HOST
                  value: "postgres"
                - name: POSTGRES_PORT
                  value: "5432"
                - name: POSTGRES_URL
                  valueFrom:
                    secretKeyRef:
                      name: pg-creds
                      key: url
                - name: PIPELINE_PHASE
                  value: "C"
                - name: PIPELINE_MODE
                  value: "starmer-t1"
                - name: LOG_LEVEL
                  value: "INFO"
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "200m"
                limits:
                  memory: "1Gi"
                  cpu: "1"
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 64Mi
